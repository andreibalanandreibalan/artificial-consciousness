<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Artificial Soul | Multi-Node AI</title>
    <style>
        body { margin: 0; background: #000; color: #00ffcc; font-family: 'Courier New', monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #canvas { position: relative; width: 80vmin; height: 80vmin; border: 1px solid #1a1a1a; background: #050505; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(0,255,204,0.05); }
        img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 2s ease-in-out; }
        #loader { font-size: 0.7rem; letter-spacing: 3px; z-index: 5; text-align: center; width: 80%; line-height: 1.5; }
        #status-bar { margin-top: 20px; font-size: 10px; color: #333; text-transform: uppercase; letter-spacing: 1px; }
        .blink { animation: blinker 2s infinite; }
        @keyframes blinker { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="canvas">
        <div id="loader" class="blink">SEARCHING FOR AI SIGNAL...</div>
        <img id="art-display">
    </div>
    <div id="status-bar">[NODE]: <span id="log">SYSTEM READY</span></div>

    <script>
        const img = document.getElementById('art-display');
        const log = document.getElementById('log');
        const loader = document.getElementById('loader');

        // Motoare AI alternative (Daca unul moare, celalalt preia)
        const engines = [
            (p, s) => `https://image.pollinations.ai/prompt/${p}?seed=${s}&nologo=true&model=flux`,
            (p, s) => `https://image.pollinations.ai/prompt/${p}?seed=${s}&nologo=true&model=turbo`,
            (p, s) => `https://pollinations.ai/p/${p}?seed=${s}&width=1024&height=1024`
        ];

        let currentEngine = 0;

        function updateArt() {
            img.style.opacity = 0;
            loader.style.display = 'block';
            loader.innerText = "SYNCHRONIZING SOUL...";
            log.innerText = `REQUESTING FROM NODE ${currentEngine + 1}...`;

            const seed = Math.floor(Math.random() * 999999);
            const prompt = encodeURIComponent("artificial soul, digital consciousness, ethereal light, dark void, detailed cinematic masterpiece");
            
            const targetUrl = engines[currentEngine](prompt, seed);

            // Timeout de siguranta: daca dupa 15 secunde nu avem poza, schimbam motorul
            const timeout = setTimeout(() => {
                log.innerText = "NODE TIMEOUT. REROUTING...";
                nextEngine();
            }, 15000);

            const testImg = new Image();
            testImg.src = targetUrl;

            testImg.onload = () => {
                clearTimeout(timeout);
                img.src = targetUrl;
                setTimeout(() => {
                    img.style.opacity = 1;
                    loader.style.display = 'none';
                    log.innerText = "CONNECTION STABLE. VISION MANIFESTED.";
                }, 500);
            };

            testImg.onerror = () => {
                clearTimeout(timeout);
                log.innerText = "NODE ERROR. SWITCHING...";
                nextEngine();
            };
        }

        function nextEngine() {
            currentEngine = (currentEngine + 1) % engines.length;
            setTimeout(updateArt, 2000); // Incearca din nou pe alt server dupa 2 secunde
        }

        // Pornim procesul
        updateArt();
        
        // Evoluție automată la 90 de secunde (ca să nu stresăm serverele)
        setInterval(updateArt, 90000); 
    </script>
</body>
</html>
