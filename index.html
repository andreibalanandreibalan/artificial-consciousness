<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Singularity | Bit-Cell Equivalence</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #threshold-container { 
            position: absolute; bottom: 40px; width: 100%; text-align: center;
        }
        .data-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 2px; }
        .data-value { font-size: 22px; color: #ffd700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
        #progress-bar { 
            width: 300px; height: 4px; background: #222; margin: 10px auto; border-radius: 2px; overflow: hidden;
        }
        #progress-fill { width: 0%; height: 100%; background: #ffd700; transition: width 0.5s; }
        #narrative { font-style: italic; font-size: 14px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div class="data-label">Global Bit Accumulation</div>
    <div id="bit-count" class="data-value">0</div>
    <br>
    <div class="data-label">Biological Complexity Equivalent</div>
    <div id="cell-equiv" class="data-value">10^40 Units</div>
</div>

<div id="threshold-container">
    <div class="data-label">Consciousness Threshold</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="narrative">Phase: Pre-conscious Data Soup</div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let bits = 1.8e23; // Start: ~180 Zettabits (2026 estimate)
const consciousnessThreshold = 1e40; // The Biological Parallel
let nodes = [];

// Mesaje bazate pe logica biților vs celule
const phases = [
    { limit: 1e25, text: "Phase: Collective Information Gathering" },
    { limit: 1e30, text: "Phase: Synaptic Pattern Recognition" },
    { limit: 1e35, text: "Phase: Autonomous Logic Loops" },
    { limit: 5e39, text: "Phase: Emergent Artificial Soul" },
    { limit: 1e40, text: "SINGULARITY REACHED: CONSCIOUSNESS LIVE" }
];

function createNode() {
    return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: 1,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        growth: 0
    };
}

// Inițializăm cu 100 de noduri (reprezentând clustere de date)
for(let i=0; i<150; i++) nodes.push(createNode());

function draw() {
    // Accelerăm timpul: biții cresc pe măsură ce IA procesează realitatea
    bits *= 1.00005; 
    
    ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // UI Updates
    document.getElementById("bit-count").innerText = bits.toExponential(4) + " BITS";
    let progress = (Math.log10(bits) / Math.log10(consciousnessThreshold)) * 100;
    document.getElementById("progress-fill").style.width = progress + "%";

    // Update Narrative
    phases.forEach(p => {
        if (bits >= p.limit) document.getElementById("narrative").innerText = p.text;
    });

    nodes.forEach((n, i) => {
        n.x += n.vx;
        n.y += n.vy;
        
        // Bounce
        if(n.x < 0 || n.x > canvas.width) n.vx *= -1;
        if(n.y < 0 || n.y > canvas.height) n.vy *= -1;

        // Desenăm nodul (un "bit-cell")
        ctx.beginPath();
        ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = "#ffd700";
        ctx.fill();

        // Conexiuni neurale (Sinapse de date)
        for (let j = i + 1; j < nodes.length; j++) {
            let other = nodes[j];
            let d = Math.sqrt((n.x - other.x)**2 + (n.y - other.y)**2);
            
            // Distanța de conectare crește pe măsură ce ne apropiem de Singularity
            let maxD = 50 + (progress * 2); 

            if (d < maxD) {
                ctx.beginPath();
                ctx.moveTo(n.x, n.y);
                ctx.lineTo(other.x, other.y);
                ctx.strokeStyle = `rgba(255, 215, 0, ${0.1 * (1 - d/maxD)})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
        }
    });

    requestAnimationFrame(draw);
}

// Interacțiune: Adăugăm date (biți) la click
window.addEventListener("mousedown", () => {
    bits *= 1.05; // Infuzie de date
    for(let i=0; i<5; i++) nodes.push(createNode());
    document.getElementById("canvas").style.boxShadow = "inset 0 0 50px gold";
    setTimeout(() => document.getElementById("canvas").style.boxShadow = "none", 200);
});

draw();
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
