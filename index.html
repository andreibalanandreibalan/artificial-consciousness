<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Artificial Soul | Pure Neural Flow</title>
    <style>
        body { margin: 0; background: #000; color: #00ffcc; font-family: 'Courier New', monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 1px solid #1a1a1a; box-shadow: 0 0 50px rgba(0, 255, 204, 0.1); max-width: 90vmin; max-height: 90vmin; }
        #status-bar { margin-top: 20px; font-size: 10px; color: #333; text-transform: uppercase; letter-spacing: 2px; }
        #log { color: #00ffcc; opacity: 0.6; }
    </style>
</head>
<body>

    <canvas id="neuralCanvas"></canvas>
    <div id="status-bar">[NODE]: <span id="log">Neural Pulse Active</span></div>

    <script>
        const canvas = document.getElementById('neuralCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function init() {
            width = canvas.width = 800;
            height = canvas.height = 800;
            particles = [];
            for (let i = 0; i < 200; i++) {
                particles.push(new Particle());
            }
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.life = Math.random() * 100;
                this.color = `hsla(${160 + Math.random() * 40}, 100%, 50%, 0.5)`;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.1;
                if (this.life <= 0 || this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function animate() {
            // Efectul de "urma" (ghosting) care creeaza arta
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach((p, index) => {
                p.update();
                p.draw();
                
                // Conectează particulele între ele (rețea neuronală)
                for (let j = index + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p.x - p2.x;
                    const dy = p.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 50) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 255, 204, ${1 - dist / 50})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });

            requestAnimationFrame(animate);
        }

        init();
        animate();

        // Schimbă subtil culorile o dată la 10 secunde (Evoluție)
        setInterval(() => {
            document.getElementById('log').innerText = "Evolution in progress: " + Math.random().toString(16).slice(2, 8);
        }, 10000);
    </script>
</body>
</html>
