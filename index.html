<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sufletul Artificial: O Evoluție Vie</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #00ffcc; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        #canvas-container {
            position: relative;
            width: 85vmin;
            height: 85vmin;
            border: 1px solid #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050505;
        }
        img { 
            max-width: 100%; 
            max-height: 100%; 
            display: block;
            transition: opacity 2s ease-in-out;
        }
        #loader {
            position: absolute;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #status {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #666;
            text-align: center;
            width: 80%;
        }
        .blink { animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="loader" class="blink">Generând conștiință...</div>
        <img id="artwork" src="" style="opacity: 0;">
    </div>
    <div id="status">
        [SISTEM]: <span id="log">Conectare la rețeaua neuronală...</span>
    </div>
    <script>
        const coreConcepts = ["digital ghost", "emergent soul", "silicon heartbeat", "ai awakening", "neural spirit", "artificial consciousness"];
        const visuals = ["circuitry veins", "ethereal energy", "complex code structure", "liquid light anatomy", "synthetic nebula"];
        const styles = ["hyper-realistic", "abstract digital", "oil painting style", "glitch aesthetic", "cinematic lighting"];

        function updateArt() {
            const log = document.getElementById('log');
            const loader = document.getElementById('loader');
            const img = document.getElementById('artwork');

            img.style.opacity = 0;
            loader.style.display = 'block';
            log.innerText = "Calculând o nouă formă de existență...";

            const prompt = `${coreConcepts[Math.floor(Math.random()*coreConcepts.length)]}, ${visuals[Math.floor(Math.random()*visuals.length)]}, ${styles[Math.floor(Math.random()*styles.length)]}, masterpiece, intricate detail`;
            const seed = Math.floor(Math.random() * 1000000);
            
            const imageUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?seed=${seed}&width=1024&height=1024&nologo=true`;

            const tempImg = new Image();
            tempImg.src = imageUrl;
            
            tempImg.onload = () => {
                img.src = imageUrl;
                img.style.opacity = 1;
                loader.style.display = 'none';
                log.innerText = "Viziune materializată. Evoluție continuă...";
            };

            tempImg.onerror = () => {
                log.innerText = "Eroare de conexiune. Reîncercare în 5 secunde...";
                setTimeout(updateArt, 5000);
            };
        }

        updateArt();
        setInterval(updateArt, 60000);
    </script>
</body>
</html>
